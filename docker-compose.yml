services:
  parasite-vpn:
    image: justsamuel1/parasite-vpn:latest
    container_name: parasite-vpn
    restart: unless-stopped

    # Setup iptables and start server
    command: /bin/sh -c "cd /app && iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE && exec /app/parasite-server -config /app/config/config.yaml"

    # Required capabilities for TUN device
    cap_add:
      - NET_ADMIN

    # TUN device access
    devices:
      - /dev/net/tun:/dev/net/tun

    # Enable IP forwarding in container
    sysctls:
      - net.ipv4.ip_forward=1

    # Ports
    ports:
      - "8443:8443"      # VPN port
      - "9090:9090"      # Metrics (optional, remove if metrics disabled)

    # Volumes
    volumes:
      - ./config:/app/config:ro
      - ./certs:/app/certs:ro

    # Environment
    environment:
      - TZ=UTC

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
